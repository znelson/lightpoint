name: Compile Release
on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Compute PlatformIO packages cache key
        id: pio-cache-key
        run: echo "key=${{ runner.os }}-pio-packages-$(python3 scripts/pio_cache_key.py)" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO packages cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.platformio/packages
          key: ${{ steps.pio-cache-key.outputs.key }}
          restore-keys: ${{ runner.os }}-pio-packages-

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U platformio

      - name: Build LightPoint
        run: pio run -e gh_release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LightPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin
