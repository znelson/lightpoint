name: Compile Release Candidate

on:
  workflow_dispatch:

jobs:
  build-release-candidate:
    if: startsWith(github.ref_name, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Compute PlatformIO packages cache key
        id: pio-cache-key
        run: echo "key=${{ runner.os }}-pio-packages-$(python3 scripts/pio_cache_key.py)" >> "$GITHUB_OUTPUT"

      - name: Restore PlatformIO packages cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.platformio/packages
          key: ${{ steps.pio-cache-key.outputs.key }}
          restore-keys: ${{ runner.os }}-pio-packages-

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U platformio

      - name: Extract env
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BRANCH_SUFFIX=${GITHUB_REF_NAME#release/}" >> $GITHUB_ENV

      - name: Build LightPoint Release Candidate
        env:
          LIGHTPOINT_RC_HASH: ${{ env.SHORT_SHA }}
        run: pio run -e gh_release_rc

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LightPoint-RC-${{ env.BRANCH_SUFFIX }}
          path: |
            .pio/build/gh_release_rc/bootloader.bin
            .pio/build/gh_release_rc/firmware.bin
            .pio/build/gh_release_rc/firmware.elf
            .pio/build/gh_release_rc/firmware.map
            .pio/build/gh_release_rc/partitions.bin
